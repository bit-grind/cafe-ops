name: Kounta live sales

on:
  schedule:
    # Keep a browser session polling each minute through trading. Runs overlap
    # slightly so a delayed hourly launch does not create a data gap.
    # 18:08-04:08 UTC = 04:08-14:08 Brisbane (UTC+10).
    - cron: '8 18-23 * * *'
    - cron: '8 0-4 * * *'
  workflow_dispatch:
    inputs:
      date_from:
        description: 'Summary date from (YYYY-MM-DD) — leave blank for today'
        required: false
      date_to:
        description: 'Summary date to (YYYY-MM-DD) — leave blank to match from'
        required: false
      upload_debug_screenshot:
        description: 'Upload a short-lived failure screenshot (may contain sensitive page content)'
        required: false
        type: boolean
        default: false
      monitor_minutes:
        description: 'Poll duration in minutes — leave blank for 60, set 0 for one-shot summary refresh'
        required: false
      poll_seconds:
        description: 'Seconds between live samples — leave blank for 60'
        required: false
      continue_monitoring:
        description: 'Dispatch a successor monitor while the cafe is trading'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  actions: write

# A running monitor must never be cancelled — cancelling it mid-poll kills the
# chain AND (via the always() successor dispatch) used to spawn an immediate
# replacement, which the next trigger cancelled in turn: a tight
# cancel/respawn storm where runs died in setup before polling. With
# cancel-in-progress: false a cron/successor that overlaps a live monitor
# queues behind it instead of killing it (GitHub keeps at most one pending run
# per group), so exactly one monitor polls at a time.
concurrency:
  group: ${{ (github.event_name == 'schedule' || github.event.inputs.continue_monitoring == 'true') && 'kounta-live-sales-monitor' || format('kounta-live-sales-manual-{0}', github.run_id) }}
  cancel-in-progress: false

jobs:
  live-summary:
    runs-on: ubuntu-latest
    # Headroom over the poll loop. The monitor polls for LIVE_MONITOR_MINUTES
    # (70 on schedule) and must EXIT cleanly so its `!cancelled()` continue step
    # can dispatch the chain successor. With timeout-minutes only 5 above the
    # poll, a slow run (checkout + npm ci + Chromium download + Kounta login)
    # crossed the timeout, GitHub marked it `cancelled`, the successor was never
    # dispatched, and the chain died until the next cron — an intermittent
    # mid-morning sales gap. 90 leaves ~20 min for setup so the poll always
    # finishes first.
    timeout-minutes: 90
    steps:
      - name: Preflight — skip cleanly until secrets are set
        id: pre
        run: |
          if [ -n "${{ secrets.KOUNTA_USER }}" ] && [ -n "${{ secrets.KOUNTA_PASS }}" ] && [ -n "${{ secrets.IMPORT_SECRET }}" ] && [ -n "${{ vars.APP_URL }}" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::KOUNTA_USER / KOUNTA_PASS / IMPORT_SECRET secrets or APP_URL variable not set yet; skipping. See kounta-sync/README.md."
          fi

      - if: steps.pre.outputs.ready == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - if: steps.pre.outputs.ready == 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24

      - name: Install deps
        if: steps.pre.outputs.ready == 'true'
        working-directory: kounta-sync
        run: npm ci

      - name: Install Chromium
        if: steps.pre.outputs.ready == 'true'
        working-directory: kounta-sync
        run: npx playwright install --with-deps chromium

      - name: Run summary sync
        id: sync
        if: steps.pre.outputs.ready == 'true'
        working-directory: kounta-sync
        run: node sync.mjs
        env:
          KOUNTA_USER: ${{ secrets.KOUNTA_USER }}
          KOUNTA_PASS: ${{ secrets.KOUNTA_PASS }}
          IMPORT_SECRET: ${{ secrets.IMPORT_SECRET }}
          APP_URL: ${{ vars.APP_URL }}
          SYNC_PRODUCTS: 'false'
          SYNC_DATE_FROM: ${{ github.event.inputs.date_from }}
          SYNC_DATE_TO: ${{ github.event.inputs.date_to }}
          UPLOAD_DEBUG_SCREENSHOT: ${{ github.event.inputs.upload_debug_screenshot }}
          LIVE_MONITOR_MINUTES: ${{ github.event_name == 'schedule' && '70' || github.event.inputs.monitor_minutes || '60' }}
          LIVE_POLL_SECONDS: ${{ github.event.inputs.poll_seconds || '60' }}
          LIVE_STOP_BRISBANE: '14:20'
          ALLOW_MISSING_CURRENT_DAY: ${{ github.event_name == 'schedule' && 'true' || github.event.inputs.continue_monitoring || 'false' }}

      - name: Upload error screenshot on failure
        if: failure() && steps.pre.outputs.ready == 'true' && github.event_name == 'workflow_dispatch' && github.event.inputs.upload_debug_screenshot == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: kounta-live-sales-error
          path: kounta-sync/kounta-sync-error.png
          if-no-files-found: ignore
          retention-days: 1

      # !cancelled() (not always()): a monitor cancelled by concurrency must NOT
      # dispatch a successor, or a cancellation spawns an instant replacement and
      # restarts the storm. Successors are still chained after a clean run, and
      # after a genuine failure (retry path below).
      - name: Continue live monitor during trading
        if: ${{ !cancelled() && steps.pre.outputs.ready == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          CONTINUE_MONITORING: ${{ github.event_name == 'schedule' && 'true' || github.event.inputs.continue_monitoring || 'false' }}
          SYNC_OUTCOME: ${{ steps.sync.outcome }}
        run: |
          if [ "$CONTINUE_MONITORING" != "true" ]; then
            exit 0
          fi

          brisbane_minute=$(node -e "
            const parts = new Intl.DateTimeFormat('en-GB', {
              timeZone: 'Australia/Brisbane',
              hour: '2-digit',
              minute: '2-digit',
              hourCycle: 'h23',
            }).formatToParts(new Date())
            const hour = Number(parts.find(part => part.type === 'hour').value)
            const minute = Number(parts.find(part => part.type === 'minute').value)
            process.stdout.write(String(hour * 60 + minute))
          ")

          if [ "$brisbane_minute" -lt 240 ] || [ "$brisbane_minute" -ge 860 ]; then
            echo "Outside the 04:00-14:20 Brisbane monitor window; not dispatching a successor."
            exit 0
          fi

          if [ "$SYNC_OUTCOME" != "success" ]; then
            echo "Previous monitor failed; waiting two minutes before retrying."
            sleep 120
          fi

          gh workflow run kounta-live-sales.yml \
            --ref "$GITHUB_REF_NAME" \
            -f monitor_minutes=70 \
            -f poll_seconds=60 \
            -f continue_monitoring=true
